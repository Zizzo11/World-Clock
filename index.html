<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>World Clock</title>
</head>
<body>
    <div id="container">
        <h1>World Clock</h1>

        <select id="city">
            <option value="local">Select a City</option>
            <option value="new-york">Los Angeles</option>
            <option value="london">Sydney</option>
            <option value="paris">Paris</option>
            <option value="tokyo">Tokyo</option>
            </select>
            <div class="city">
                <h2> Los Angeles</h2>
                <div class="date">August 15th, 2026</div>
                <div class="time">10:30:00 AM</div>
            </div>    </div>
<footer>
   This project was coded by Zahra and is open-sourced on <a href="https://github.com/Zizzo11/World-Clock">GitHub</a>
</footer>
<script src="index.js"></script>
</body>
</html>
